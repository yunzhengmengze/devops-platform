name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  APP_VERSION: ${{ github.run_number }}

jobs:
  # ========== 阶段 1: 测试 ==========
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Check code style
        run: pip install ruff && ruff check app/

  # ========== 阶段 2: 构建 & 推送镜像 ==========
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-platform:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-platform:${{ env.APP_VERSION }}
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========== 阶段 3: 部署到 K8s ==========
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy with Helm
        run: |
          helm upgrade --install devops-app ./helm/devops-app \
            --namespace devops-demo --create-namespace \
            --set image.tag=${{ env.APP_VERSION }} \
            --set app.version=${{ env.APP_VERSION }} \
            --wait --timeout 5m

      - name: Verify deployment
        run: |
          kubectl get pods -n devops-demo
          kubectl get svc -n devops-demo
